name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
      - "[0-9]*.*.*"
      - "[0-9]*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish jars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Collect jars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          shopt -s nullglob
          jars=(build/libs/*.jar)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No jars were produced in build/libs" >&2
            exit 1
          fi
          cp "${jars[@]}" release/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$TAG_NAME"
          if [[ "$TAG_NAME" == *-* ]]; then
            release_tag="${TAG_NAME%%-*}"
          fi
          release_version="${release_tag#v}"
          title="ChainVeinFabric ${release_version}"
          notes_file="RELEASE_NOTE.md"
          mapfile -t files < <(find release -type f -name '*.jar' | sort)

          if [ "$TAG_NAME" = "$release_tag" ]; then
            if gh release view "$release_tag" >/dev/null 2>&1; then
              gh release edit "$release_tag" --title "$title" --notes-file "$notes_file"
              gh release upload "$release_tag" "${files[@]}" --clobber
            else
              gh release create "$release_tag" "${files[@]}" --title "$title" --notes-file "$notes_file"
            fi
          else
            gh release upload "$release_tag" "${files[@]}" --clobber
          fi
